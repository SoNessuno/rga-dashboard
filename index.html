<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGA | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Courier New', Courier, monospace; }
        .border-rga { border-color: #8b0000; }
        .bg-rga { background-color: #111; }
        .hidden { display: none; }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="login-screen" class="bg-rga p-8 rounded-lg border-2 border-rga shadow-2xl w-full max-w-sm text-center">
        <h1 class="text-red-600 text-2xl font-bold mb-6 tracking-widest">RED GHØST ARMY</h1>
        <p class="text-zinc-500 text-xs mb-8 uppercase tracking-tighter">Accesso limitato al personale autorizzato</p>
        <button onclick="loginWithDiscord()" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold py-3 rounded transition flex items-center justify-center gap-2">
            <span>LOGIN CON DISCORD</span>
        </button>
    </div>

    <div id="command-center" class="bg-rga p-8 rounded-lg border-2 border-rga shadow-2xl w-full max-w-md hidden">
        <h1 class="text-red-600 text-2xl font-bold mb-6 text-center tracking-widest">RGA HQ | COMMAND</h1>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-red-500 uppercase font-bold tracking-tighter">Titolo Pannello Ticket</label>
                <input id="title" type="text" placeholder="..." class="w-full bg-black border border-zinc-800 p-2 rounded mt-1 focus:border-red-600 outline-none text-white transition-colors">
            </div>
            <div>
                <label class="text-xs text-red-500 uppercase font-bold tracking-tighter">Descrizione Operativa</label>
                <textarea id="desc" class="w-full bg-black border border-zinc-800 p-2 rounded mt-1 h-32 focus:border-red-600 outline-none text-white"></textarea>
            </div>
            <button onclick="deployConfig()" class="w-full bg-red-900 hover:bg-red-700 text-white font-bold py-3 rounded transition border border-red-500">
                ESEGUI DEPLOY
            </button>
            <button onclick="logout()" class="w-full text-zinc-600 text-[10px] uppercase mt-2 hover:text-red-500 transition">Logout / Disconnetti</button>
        </div>
        <p id="status" class="mt-4 text-center text-xs text-zinc-500 font-mono tracking-widest uppercase"></p>
    </div>

    <script>
        // CONFIGURAZIONE OAUTH2
        const CLIENT_ID = '1481800253807001700'; // <--- METTI QUI IL TUO CLIENT ID
        const REDIRECT_URI = encodeURIComponent(window.location.origin);
        const AUTH_URL = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${REDIRECT_URI}&response_type=token&scope=identify%20guilds.members.read`;

        // CONTROLLO TOKEN NELL'URL
        const fragment = new URLSearchParams(window.location.hash.slice(1));
        let accessToken = fragment.get('access_token') || localStorage.getItem('rga_token');

        if (accessToken) {
            localStorage.setItem('rga_token', accessToken);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('command-center').classList.remove('hidden');
            // Pulisci URL dai parametri sensibili
            window.history.replaceState({}, document.title, "/");
        }

        function loginWithDiscord() {
            window.location.href = AUTH_URL;
        }

        function logout() {
            localStorage.removeItem('rga_token');
            window.location.reload();
        }

        async function deployConfig() {
            const status = document.getElementById('status');
            status.innerText = "TRASMISSIONE IN CORSO...";
            status.className = "mt-4 text-center text-xs font-mono text-zinc-500 loading";
            
            const payload = {
                token: accessToken, // Inviamo il token al bot per la verifica
                title: document.getElementById('title').value.trim(),
                description: document.getElementById('desc').value.trim()
            };

            try {
                const res = await fetch('/api/update-ticket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    status.innerText = "STATUS: DEPLOY COMPLETATO";
                    status.className = "mt-4 text-center text-xs font-mono text-green-500 font-bold";
                } else if (res.status === 401) {
                    status.innerText = "ERROR: ACCESSO NEGATO (NON SEI STAFF)";
                    status.className = "mt-4 text-center text-xs font-mono text-red-500";
                } else {
                    status.innerText = "ERROR: INTERCESSIONE FALLITA";
                    status.className = "mt-4 text-center text-xs font-mono text-red-500";
                }
            } catch (e) {
                status.innerText = "ERROR: VPS NON RAGGIUNGIBILE";
                status.className = "mt-4 text-center text-xs font-mono text-red-600";
            }
        }
    </script>
</body>
</html>
